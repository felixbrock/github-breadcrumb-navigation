<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 16px;
    min-width: 320px;
    color: #1f2328;
    font-size: 13px;
  }
  h3 { margin: 0 0 12px; font-size: 15px; }
  label { display: block; margin-bottom: 6px; font-weight: 600; }
  input {
    width: 100%;
    padding: 5px 8px;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    font-size: 13px;
    box-sizing: border-box;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }
  input:focus { outline: none; border-color: #0969da; box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3); }
  .note { font-size: 11px; color: #656d76; margin: 4px 0 0; }
  .note code { background: rgba(175, 184, 193, 0.2); padding: 1px 4px; border-radius: 3px; font-size: 11px; }
  button {
    margin-top: 12px;
    padding: 5px 16px;
    background: #2da44e;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }
  button:hover { background: #2c974b; }
  .status { margin-top: 8px; font-size: 12px; color: #57606a; }
</style>
</head>
<body>
  <h3>GitHub Breadcrumb Navigator</h3>
  <label for="token">Personal Access Token</label>
  <input type="password" id="token" placeholder="ghp_...">
  <p class="note">Create at github.com/settings/tokens. Needs <code>repo</code> scope for private repos.</p>
  <button id="save">Save</button>
  <div class="status" id="status"></div>
  <script src="options.js"></script>
</body>
</html>
